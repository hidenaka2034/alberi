<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#2b5e3a">
<title>Alberi</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=Playfair+Display:wght@400;600;700&display=swap"/>
<style>
:root{--bg:#f4f1eb;--surface:#fff;--primary:#2b5e3a;--primary-light:#e8f0ea;
--accent:#c75d3a;--accent-light:#fdf0ec;--text:#1e1e1e;--muted:#7a8a7e;
--border:#e2e0da;--shadow:0 2px 16px rgba(0,0,0,.10);
--vigor-excellent:#2a8c42;--vigor-good:#5aaa5e;--vigor-fair:#d4a030;
--vigor-declining:#d07828;--vigor-critical:#c43030;--vigor-dead:#555;
--need-green:#4a9b5f;--need-yellow:#d4a030;--need-red:#c43030;
--radius:14px;--font:'DM Sans',sans-serif;--display:'Playfair Display',serif;}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;min-height:100vh;overflow:hidden;font-family:var(--font);color:var(--text);background:var(--bg);}
#map{position:fixed;top:0;left:0;right:0;bottom:0;z-index:1;width:100%;height:100%;}
.top-bar{position:fixed;top:0;left:0;right:0;z-index:1000;display:flex;align-items:center;
padding:12px 16px;gap:8px;background:rgba(255,255,255,.92);backdrop-filter:blur(12px);
border-bottom:1px solid var(--border);}
.top-bar h1{font-family:var(--display);font-size:20px;font-weight:700;color:var(--primary);flex:1;}
.top-bar .count{font-size:13px;color:var(--muted);font-weight:400;}
.top-bar select{padding:6px 8px;border:1.5px solid var(--border);border-radius:8px;font-size:12px;
font-family:var(--font);background:#fff;color:var(--text);max-width:120px;}
.btn-sm{width:32px;height:32px;border-radius:50%;border:none;background:var(--primary);color:#fff;
font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;
box-shadow:0 2px 6px rgba(43,94,58,.25);}
.fab-group{position:fixed;bottom:28px;right:16px;z-index:1400;display:flex;flex-direction:column;gap:12px;}
.fab{width:56px;height:56px;border-radius:50%;border:none;cursor:pointer;display:flex;
align-items:center;justify-content:center;font-size:24px;box-shadow:var(--shadow);transition:transform .2s;}
.fab:active{transform:scale(.92);}
.fab-mic{background:var(--primary);color:#fff;}
.fab-mic.listening{background:#c43030;animation:pulse 1.2s infinite;}
.fab-cam{background:var(--surface);color:var(--primary);border:2px solid var(--primary-light);}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(196,48,48,.4)}50%{box-shadow:0 0 0 14px rgba(196,48,48,0)}}
.sheet-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.3);
z-index:1200;opacity:0;pointer-events:none;transition:opacity .3s;}
.sheet-overlay.open{opacity:1;pointer-events:auto;}
.sheet{position:fixed;left:0;right:0;bottom:0;z-index:1300;background:var(--surface);
border-radius:20px 20px 0 0;transform:translateY(100%);transition:transform .35s cubic-bezier(.4,0,.2,1);
max-height:88vh;overflow-y:auto;padding-bottom:32px;box-shadow:0 -4px 30px rgba(0,0,0,.12);}
.sheet.open{transform:translateY(0);}
.sheet-handle{width:40px;height:4px;background:#ccc;border-radius:2px;margin:10px auto 0;}
.sheet-header{padding:16px 20px 12px;border-bottom:1px solid var(--border);}
.sheet-header .species{font-family:var(--display);font-size:22px;font-weight:700;color:var(--primary);display:inline;}
.sheet-header .common{font-size:14px;color:var(--muted);margin-top:2px;}
.sheet-header .meta{display:flex;gap:8px;margin-top:8px;align-items:center;flex-wrap:wrap;}
.vigor-badge{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;color:#fff;text-transform:uppercase;letter-spacing:.5px;}
.id-badge{font-size:12px;color:var(--muted);font-family:monospace;background:var(--bg);padding:2px 8px;border-radius:6px;}
.vigor-selector{display:flex;gap:5px;flex-wrap:wrap;margin-top:8px;}
.vigor-opt{padding:4px 10px;border-radius:14px;font-size:11px;font-weight:600;cursor:pointer;
border:2px solid transparent;transition:all .2s;opacity:.45;color:#fff;}
.vigor-opt.active{opacity:1;border-color:rgba(0,0,0,.15);box-shadow:0 1px 4px rgba(0,0,0,.12);}
.vigor-opt:hover{opacity:.75;}
.zone-row{display:flex;gap:6px;align-items:center;margin-top:8px;}
.zone-row select{flex:1;padding:6px 8px;border:1.5px solid var(--border);border-radius:8px;font-size:12px;font-family:var(--font);background:#fff;}
.zone-row button{padding:4px 8px;border:1.5px solid var(--primary);border-radius:8px;background:var(--primary-light);
color:var(--primary);font-size:11px;font-weight:600;cursor:pointer;font-family:var(--font);white-space:nowrap;}
.water-row{display:flex;align-items:center;gap:10px;margin:14px 0 6px;padding:0 20px;}
.water-input-wrap{display:flex;align-items:center;gap:6px;background:var(--bg);border-radius:10px;
padding:4px 8px;border:1.5px solid var(--border);}
.water-input-wrap input{width:50px;border:none;background:transparent;font-size:18px;font-weight:700;
text-align:center;font-family:var(--font);color:var(--primary);outline:none;}
.water-input-wrap span{font-size:14px;color:var(--muted);font-weight:500;}
.water-input-wrap button{width:28px;height:28px;border-radius:50%;border:1.5px solid var(--border);
background:var(--surface);font-size:16px;cursor:pointer;display:flex;align-items:center;
justify-content:center;color:var(--primary);font-weight:700;}
.btn-water{flex:1;padding:12px 14px;border:none;border-radius:var(--radius);
background:linear-gradient(135deg,#2b8adb,#1b6aaa);color:#fff;font-size:15px;font-weight:600;
font-family:var(--font);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;}
.btn-water:active{transform:scale(.97);}
.section{padding:14px 20px 0;}
.section-title{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:8px;}
/* Quick action buttons */
.quick-actions{display:flex;flex-wrap:wrap;gap:6px;padding:0 20px 4px;}
.qa-btn{padding:6px 10px;border-radius:10px;border:1.5px solid var(--border);background:var(--bg);
font-size:12px;cursor:pointer;font-family:var(--font);color:var(--text);transition:all .15s;display:flex;align-items:center;gap:4px;}
.qa-btn:active{background:var(--primary-light);border-color:var(--primary);}
/* Needs */
.needs-row{display:flex;flex-wrap:wrap;gap:6px;}
.need-pill{padding:5px 12px;border-radius:16px;border:1.5px solid var(--border);background:var(--bg);
font-size:12px;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:5px;
font-family:var(--font);color:var(--text);position:relative;}
.need-pill.active{font-weight:600;}
.need-pill .dot{width:8px;height:8px;border-radius:50%;transition:background .2s;}
.need-pill .age{font-size:10px;margin-left:2px;opacity:.7;}
/* Watering plan */
.water-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:6px;}
.water-cell{background:var(--bg);border-radius:10px;padding:8px 4px;text-align:center;cursor:pointer;
transition:background .2s;border:1.5px solid transparent;}
.water-cell:hover{border-color:var(--primary);}
.water-cell .month{font-size:10px;font-weight:700;text-transform:uppercase;color:var(--muted);letter-spacing:.5px;}
.water-cell .freq{font-size:16px;font-weight:700;color:var(--primary);margin:4px 0 2px;}
.water-cell .liters{font-size:11px;color:var(--muted);}
.water-edit{display:none;flex-direction:column;gap:6px;margin-top:10px;padding:12px;background:var(--primary-light);border-radius:var(--radius);}
.water-edit.open{display:flex;}
.water-edit label{font-size:12px;font-weight:600;color:var(--primary);}
.water-edit input{width:100%;padding:8px;border:1.5px solid var(--border);border-radius:8px;font-size:14px;font-family:var(--font);background:#fff;}
.water-edit .row{display:flex;gap:8px;}
.water-edit .row>div{flex:1;}
.water-edit button{padding:8px;border:none;border-radius:8px;background:var(--primary);color:#fff;font-weight:600;cursor:pointer;font-family:var(--font);}
/* Interventions */
.interv-list{display:flex;flex-direction:column;gap:6px;padding-bottom:16px;}
.interv-item{display:flex;align-items:flex-start;gap:10px;padding:8px 10px;background:var(--bg);border-radius:10px;position:relative;}
.interv-icon{font-size:16px;width:28px;height:28px;display:flex;align-items:center;justify-content:center;border-radius:8px;background:var(--surface);flex-shrink:0;}
.interv-info{flex:1;min-width:0;}
.interv-type{font-size:13px;font-weight:600;}
.interv-date{font-size:11px;color:var(--muted);}
.interv-note{font-size:12px;color:var(--muted);margin-top:2px;}
.interv-del{position:absolute;top:6px;right:8px;width:22px;height:22px;border-radius:50%;border:none;
background:transparent;color:var(--muted);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.interv-del:hover{background:#fdd;color:var(--accent);}
/* QV */
.qv-section{margin-top:10px;padding:12px;background:var(--bg);border-radius:var(--radius);}
.qv-section-title{font-size:11px;font-weight:700;color:var(--primary);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;padding-bottom:4px;border-bottom:1px solid var(--border);}
.qv-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px 12px;}
.qv-row{display:flex;flex-direction:column;padding:3px 0;}
.qv-label{font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.3px;}
.qv-val{font-size:13px;font-weight:500;color:var(--text);}
.qv-val.warn{color:var(--accent);font-weight:700;}
.qv-val.good{color:var(--vigor-good);}
.qv-full{grid-column:1/-1;}
.qv-co2{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-top:4px;}
.qv-co2-cell{text-align:center;padding:6px 4px;background:var(--surface);border-radius:8px;}
.qv-co2-cell .v{font-size:15px;font-weight:700;color:var(--primary);}
.qv-co2-cell .u{font-size:9px;color:var(--muted);}
/* Vivaio */
.viv-form{display:flex;flex-direction:column;gap:10px;margin-top:10px;}
.viv-row{display:flex;gap:8px;}
.viv-row>div{flex:1;}
.viv-field label{font-size:11px;font-weight:600;color:var(--muted);display:block;margin-bottom:3px;text-transform:uppercase;letter-spacing:.3px;}
.viv-field input,.viv-field select,.viv-field textarea{width:100%;padding:8px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;font-family:var(--font);background:#fff;}
.viv-field textarea{resize:vertical;min-height:50px;}
.viv-save{padding:10px;border:none;border-radius:8px;background:var(--primary);color:#fff;font-weight:600;cursor:pointer;font-family:var(--font);margin-top:4px;}
/* Toast */
.toast{position:fixed;top:70px;left:50%;transform:translateX(-50%) translateY(-20px);z-index:2000;
background:var(--primary);color:#fff;padding:10px 20px;border-radius:12px;font-size:14px;font-weight:500;
opacity:0;transition:all .3s;pointer-events:none;box-shadow:0 4px 20px rgba(0,0,0,.15);white-space:nowrap;max-width:92vw;text-overflow:ellipsis;overflow:hidden;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.voice-bar{position:fixed;bottom:96px;left:16px;right:80px;z-index:1400;background:var(--surface);
border-radius:var(--radius);padding:10px 14px;box-shadow:var(--shadow);font-size:14px;
color:var(--text);display:none;border:2px solid var(--primary);}
.voice-bar.show{display:block;}
.voice-bar .label{font-size:10px;font-weight:700;color:var(--primary);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;}
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.4);
z-index:2000;display:none;align-items:flex-end;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal{background:var(--surface);border-radius:20px 20px 0 0;padding:20px;width:100%;max-height:75vh;overflow-y:auto;}
.modal h2{font-family:var(--display);font-size:20px;color:var(--primary);margin-bottom:16px;}
.modal .field{margin-bottom:12px;}
.modal .field label{font-size:12px;font-weight:600;color:var(--muted);display:block;margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px;}
.modal .field input,.modal .field select{width:100%;padding:10px;border:1.5px solid var(--border);border-radius:10px;font-size:14px;font-family:var(--font);background:#fff;}
.modal .actions{display:flex;gap:10px;margin-top:16px;}
.modal .actions button{flex:1;padding:12px;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;font-family:var(--font);}
.modal .btn-confirm{background:var(--primary);color:#fff;}
.modal .btn-cancel{background:var(--bg);color:var(--text);}
.gps-btn{padding:8px 14px;border:1.5px solid var(--primary);border-radius:10px;background:var(--primary-light);
color:var(--primary);font-weight:600;cursor:pointer;font-family:var(--font);font-size:13px;margin-top:4px;display:inline-flex;align-items:center;gap:6px;}
.gps-btn.done{border-color:var(--vigor-good);color:var(--vigor-good);background:#e8f5e9;}

/* Images section */
.img-grid{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px;}
.img-thumb{width:72px;height:72px;border-radius:10px;object-fit:cover;cursor:pointer;border:2px solid var(--border);transition:all .2s;}
.img-thumb.profile{border-color:var(--primary);box-shadow:0 0 0 2px var(--primary-light);}
.img-thumb-wrap{position:relative;}
.img-thumb-del{position:absolute;top:-4px;right:-4px;width:20px;height:20px;border-radius:50%;background:var(--accent);color:#fff;border:2px solid #fff;font-size:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 1px 3px rgba(0,0,0,.2);}
.img-thumb-star{position:absolute;bottom:-4px;right:-4px;width:20px;height:20px;border-radius:50%;background:var(--primary);color:#fff;border:2px solid #fff;font-size:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 1px 3px rgba(0,0,0,.2);}
.img-full-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.85);z-index:2000;display:none;align-items:center;justify-content:center;cursor:pointer;}
.img-full-overlay.open{display:flex;}
.img-full-overlay img{max-width:95%;max-height:90vh;border-radius:8px;}
.profile-pic{width:38px;height:38px;border-radius:50%;object-fit:cover;border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.15);margin-right:8px;vertical-align:middle;}

/* GPS & Session */
.session-bar{position:fixed;top:52px;left:0;right:0;z-index:1000;background:linear-gradient(135deg,#2b8adb,#1b6aaa);
color:#fff;padding:10px 16px;display:none;align-items:center;gap:10px;font-size:14px;font-weight:500;
box-shadow:0 2px 10px rgba(0,0,0,.2);}
.session-bar.active{display:flex;}
.session-bar .dot{width:10px;height:10px;border-radius:50%;background:#4ade80;animation:blink 1.5s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.session-bar .count{font-weight:700;font-size:16px;}
.session-bar button{padding:6px 14px;border:2px solid rgba(255,255,255,.5);border-radius:8px;background:transparent;
color:#fff;font-weight:600;cursor:pointer;font-family:var(--font);font-size:13px;}
.gps-indicator{width:10px;height:10px;border-radius:50%;background:#ccc;flex-shrink:0;}
.gps-indicator.tracking{background:#4ade80;animation:blink 1.5s infinite;}
.verified-badge{font-size:11px;color:var(--vigor-good);display:flex;align-items:center;gap:3px;}

/* Map pick mode */
.map-pick-banner{position:fixed;top:56px;left:0;right:0;z-index:1500;
  background:var(--primary);color:#fff;padding:12px 20px;text-align:center;
  font-size:14px;font-weight:600;display:none;box-shadow:0 2px 10px rgba(0,0,0,.2);}
.map-pick-banner.active{display:block;}
.map-crosshair{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
  z-index:1499;pointer-events:none;font-size:32px;display:none;
  filter:drop-shadow(0 0 4px rgba(0,0,0,.4));}
.map-crosshair.active{display:block;}
.empty-msg{text-align:center;color:var(--muted);font-size:13px;padding:8px 0;font-style:italic;}
.leaflet-container{font-family:var(--font)!important;}
.tree-marker{transition:transform .2s ease;transform-origin:center center;cursor:pointer;}
.tree-marker:hover{transform:scale(1.6);z-index:9999!important;}
.leaflet-marker-icon:has(.tree-marker:hover){z-index:9999!important;}
</style>
</head>
<body>


<div id="map"></div>
<div class="top-bar">
  <h1>🌳 Alberi <span class="count" id="treeCount"></span></h1>
  <select id="zoneFilter" title="Filtra per zona"><option value="">Tutte le zone</option></select>
  <span class="gps-indicator" id="gpsIndicator" title="GPS"></span>
  <button class="btn-sm" id="btnSession" title="Sessione annaffiamento" style="background:#2b8adb;font-size:13px;width:auto;padding:0 10px;border-radius:8px;" onclick="toggleSession()">💧▶</button>
  <button class="btn-sm" id="btnBulkWater" title="Annaffia tutta la zona" style="background:#2b8adb;font-size:14px;display:none;">💧</button>
  <button class="btn-sm" id="btnAddZone" title="Nuova zona" style="font-size:12px;">+Z</button>
  <button class="btn-sm" id="btnAddTree" title="Aggiungi albero">+</button>
</div>
<div class="session-bar" id="sessionBar">
  <span class="dot"></span>
  <span>Sessione annaffiamento</span>
  <span class="count" id="sessionCount">0</span>
  <span>alberi</span>
  <span style="flex:1"></span>
  <button onclick="endWateringSession()">⏹ Fine</button>
</div>
<div class="map-pick-banner" id="mapPickBanner">
  📍 Tocca sulla mappa per posizionare l'albero
  <button onclick="cancelMapPick()" style="margin-left:12px;padding:4px 12px;border:2px solid rgba(255,255,255,.5);border-radius:8px;background:transparent;color:#fff;font-weight:600;cursor:pointer;font-family:var(--font);">Annulla</button>
</div>
<div class="map-crosshair" id="mapCrosshair">🎯</div>
<div class="fab-group">
  <button class="fab fab-cam" id="btnCam" title="Scatta foto">📷</button>
  <button class="fab fab-mic" id="btnMic" title="Comando vocale">🎙️</button>
</div>
<input type="file" id="camInput" accept="image/*" capture="environment" style="display:none"/>
<div class="voice-bar" id="voiceBar"><div class="label">🎙️ Ascolto...</div><div id="voiceText">...</div></div>
<div class="sheet-overlay" id="sheetOverlay"></div>
<div class="sheet" id="sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-header" id="sheetHeader"></div>
  <div class="section" id="sectionSalvaAlbero" style="display:none;"><button onclick="salvaAlbero()" style="width:100%;padding:12px;border:none;border-radius:14px;background:var(--primary);color:#fff;font-size:14px;font-weight:700;cursor:pointer;">✅ Salva albero</button></div>
  <div id="sectionVigor" class="section"></div>
  <div id="sectionZone" class="section"></div>
  <div class="section" id="sectionAzioni"><div class="section-title">Azioni</div><div id="azioniContent"></div></div>
  <div class="section"><div class="section-title">Necessità</div><div class="needs-row" id="needsRow"></div></div>
  <div class="section"><div class="section-title">Piano Annaffiature · Mag–Ott</div>
    <div class="water-grid" id="waterGrid"></div><div class="water-edit" id="waterEdit"></div></div>
  <div class="section"><div class="section-title">Ultimi Interventi</div><div class="interv-list" id="intervList"></div></div>
  <div class="section" id="sectionImages">
    <div class="section-title">Immagini <span id="imgCount" style="font-weight:400;opacity:.6;"></span></div>
    <div class="img-grid" id="imgGrid"></div>
  </div>
  <div class="section" id="sectionQV" style="display:none"><div class="section-title" style="cursor:pointer" id="qvToggle">▶ Qualiviva</div><div id="qvContent" style="display:none"></div></div>
  <div class="section" id="sectionVivaio"><div class="section-title" style="cursor:pointer" id="vivaioToggle">▶ Vivaio</div><div id="vivaioContent" style="display:none"></div></div>
  <div class="section" style="padding-bottom:20px;margin-top:12px;"><button onclick="confirmDeleteTree()" style="width:100%;padding:12px;border:1.5px solid var(--accent);border-radius:var(--radius);background:var(--accent-light);color:var(--accent);font-size:14px;font-weight:600;cursor:pointer;font-family:var(--font);">🗑️ Elimina albero</button></div>
</div>

<div class="modal-overlay" id="modalAdd">
  <div class="modal">
    <h2>Nuovo Albero</h2>
    <div class="field"><label>Specie (nome scientifico)</label>
      <input id="fSpecies" placeholder="Digita per cercare..." autocomplete="off" oninput="filterSpecies(this.value)" onfocus="filterSpecies(this.value)"/>
      <div id="speciesList" style="max-height:150px;overflow-y:auto;border:1.5px solid var(--border);border-radius:10px;background:#fff;display:none;margin-top:4px;"></div></div>
    <div class="field"><label>Nome comune</label><input id="fCommon" placeholder="es. Leccio"/></div>

function getQV(species){
  const key=(species||'').toLowerCase().trim();
  if(QV_DB[key]) return QV_DB[key];
  for(const k in QV_DB){
    if(k.includes(key)||key.includes(k)) return QV_DB[k];
    const g=key.split(' ')[0];
    if(k.startsWith(g)&&k.split(' ').length>=2&&key.split(' ').length>=2&&k.split(' ')[1]===key.split(' ')[1]) return QV_DB[k];
  }
  return null;
}

  var inp=document.getElementById('fSpecies');

  var list=document.getElementById('speciesList');
  if(!list) return;
  if(!val||val.length<2){list.style.display='none';return;}
  var lower=val.toLowerCase();
  var matches=QV_SPECIES.filter(function(s){
    if(s.toLowerCase().indexOf(lower)>=0) return true;
    var k=s.toLowerCase().trim();
    return QV_DB[k]&&QV_DB[k].nome_comune&&QV_DB[k].nome_comune.toLowerCase().indexOf(lower)>=0;

  if(!matches.length){list.style.display='none';return;}

};

function today(){return new Date().toISOString().split('T')[0];}
function daysBetween(d1,d2){return Math.floor((new Date(d2)-new Date(d1))/86400000);}
function needColor(dateStr){
  if(!dateStr) return null;
  const d=daysBetween(dateStr,today());
  if(d<=10) return 'var(--need-green)';
  if(d<=20) return 'var(--need-yellow)';
  return 'var(--need-red)';
}

function wateringStatus(t){
  const mo=new Date().getMonth()+1;
  if(mo<5||mo>10) return null;
  const plan=t.watering&&t.watering[mo];
  if(!plan) return null;
  const irrs=(t.interventions||[]).filter(i=>i.type==="irrigazione").sort((a,b)=>b.date.localeCompare(a.date));
  if(irrs.length===0) return {days:null,never:true,color:'var(--need-yellow)'};
  const since=daysBetween(irrs[0].date,today());
  const overdue=since-plan.freq;
  if(overdue<1) return null;
  if(overdue<3) return {days:overdue,never:false,color:'var(--need-green)'};
  if(overdue<5) return {days:overdue,never:false,color:'var(--need-yellow)'};
  return {days:overdue,never:false,color:'var(--need-red)'};
}

    if(p.right) style+='right:'+p.right+';';

    if(p.mt) style+='margin-top:'+p.mt+';';
    needHtml+='<span title="'+title+'" style="'+style+'">'+slot.icon+'</span>';
  });
  return L.divIcon({
    className:'',
    html:'<div class="tree-marker" style="position:relative;width:36px;height:36px;display:flex;align-items:center;justify-content:center;"><div title="'+tree.common+' ('+tree.species+')" style="width:26px;height:26px;border-radius:50%;background:'+v.color+';display:flex;align-items:center;justify-content:center;color:#fff;font-size:11px;font-weight:800;box-shadow:0 2px 8px rgba(0,0,0,.3);border:2px solid #fff;font-family:DM Sans,sans-serif;">'+(tree.num||'?')+'</div>'+needHtml+'</div>',
    iconSize:[36,36],iconAnchor:[18,18]
  });
}

function renderMarkers(){
  Object.values(markers).forEach(m=>map.removeLayer(m));
  markers={};
  trees.forEach(t=>{
    if(activeZoneFilter&&t.zone!==activeZoneFilter) return;
    const m=L.marker([t.lat,t.lon],{icon:makeIcon(t)}).addTo(map);
    m.on('click',()=>selectTree(t.id));
    markers[t.id]=m;
  });
  const shown=Object.keys(markers).length;
  document.getElementById('treeCount').textContent=shown+' alberi';
}

function canLogToday(t,type){
  const d=today();
  return !(t.interventions||[]).some(i=>i.type===type&&i.date===d);
}

window.doWater=function(){
  const t=trees.find(x=>x.id===selectedId);if(!t) return;
  if(!canLogToday(t,'irrigazione')){showToast('⚠️ Irrigazione già registrata oggi');return;}
  t.interventions.push({id:'i'+Date.now(),type:'irrigazione',date:today(),details:{volume_litri:waterLiters},note:''});
  saveData();renderSheet(t);renderMarkers();
  showToast('💧 #'+t.num+' '+t.common+' — '+waterLiters+'L');
};

window.quickAction=function(needKey){
  const t=trees.find(x=>x.id===selectedId);if(!t) return;
  const type=needKey==='taglio_erba'?'taglio_erba':needKey;
  if(!canLogToday(t,type)){showToast('⚠️ '+type+' già registrato oggi');return;}
  const nd=NEED_DEFS.find(n=>n.key===needKey);
  t.interventions.push({id:'i'+Date.now(),type,date:today(),details:{},note:''});

  if(t.needs&&t.needs[needKey]) t.needs[needKey]=null;
  saveData();renderSheet(t);renderMarkers();

window.delInterv=function(treeId,intervId){

document.getElementById('btnGpsAdd').onclick=function(){
  const btn=document.getElementById('btnGpsAdd');
  const status=document.getElementById('gpsStatus');
  // Use already-tracked position if available (faster, no extra permission)
  if(lastGpsPos){
    addGps={lat:lastGpsPos.lat,lon:lastGpsPos.lon};
    status.textContent=addGps.lat.toFixed(5)+', '+addGps.lon.toFixed(5)+' (±'+Math.round(lastGpsPos.acc||5)+'m)';
    btn.textContent='✅ Posizione acquisita';
    btn.className='gps-btn done';

  }
  // Fallback: fresh request
  if(!navigator.geolocation){showToast('⚠️ GPS non disponibile');return;}

  btn.disabled=true;
  navigator.geolocation.getCurrentPosition(
    function(pos){
      addGps={lat:pos.coords.latitude,lon:pos.coords.longitude};
      lastGpsPos={lat:pos.coords.latitude,lon:pos.coords.longitude,acc:pos.coords.accuracy};updateUserMarker(lastGpsPos);

      btn.textContent='✅ Posizione acquisita';
      btn.className='gps-btn done';
      btn.disabled=false;
    },
    function(err){
      btn.textContent='📍 Usa la mia posizione';
      btn.disabled=false;
      if(err.code===1) showToast('⚠️ Permesso GPS negato — abilitalo nelle impostazioni');
      else if(err.code===3) showToast('⚠️ GPS timeout — riprova all\'aperto');
      else showToast('⚠️ Errore GPS: '+err.message);
    },
    {enableHighAccuracy:true,timeout:15000,maximumAge:5000}
  );
};

// ═══ GPS TRACKING & SESSIONS ═══
const PROXIMITY_M=5; // soglia prossimità in metri (GPS consumer ha precisione 3-5m)
const DWELL_MS=10000; // tempo di sosta per riconoscimento (10 secondi)
let gpsWatchId=null;
let nearbyTimers={}; // treeId -> startTimestamp
let wateringSession=false;
let sessionWatered=[];
let lastGpsPos=null;

function distanceMeters(lat1,lon1,lat2,lon2){
  const R=6371000,dLat=(lat2-lat1)*Math.PI/180,dLon=(lon2-lon1)*Math.PI/180;
  const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

var userMarker=null;
function updateUserMarker(pos){
  if(!map) return;
  if(userMarker){userMarker.setLatLng([pos.lat,pos.lon]);}
  else{userMarker=L.circleMarker([pos.lat,pos.lon],{radius:9,fillColor:'#2b8adb',fillOpacity:.9,color:'#fff',weight:2.5}).addTo(map);}
}
function startGpsTracking(){
  if(gpsWatchId) return;
  if(!navigator.geolocation){showToast('⚠️ GPS non disponibile');return;}
  gpsWatchId=navigator.geolocation.watchPosition(
    function(pos){
      lastGpsPos={lat:pos.coords.latitude,lon:pos.coords.longitude,acc:pos.coords.accuracy};updateUserMarker(lastGpsPos);
      document.getElementById('gpsIndicator').classList.add('tracking');
      checkProximity(lastGpsPos);
    },
    function(err){
      document.getElementById('gpsIndicator').classList.remove('tracking');
    },
    {enableHighAccuracy:true,maximumAge:2000,timeout:10000}
  );
}

function stopGpsTracking(){
  if(gpsWatchId){navigator.geolocation.clearWatch(gpsWatchId);gpsWatchId=null;}
  document.getElementById('gpsIndicator').classList.remove('tracking');
  nearbyTimers={};
}

function checkProximity(pos){
  const now=Date.now();
  trees.forEach(function(t){
    const dist=distanceMeters(pos.lat,pos.lon,t.lat,t.lon);
    if(dist<=PROXIMITY_M){
      // Within proximity
      if(!nearbyTimers[t.id]){
        nearbyTimers[t.id]=now; // start dwell timer
      } else if(now-nearbyTimers[t.id]>=DWELL_MS){
        // Dwelled long enough
        onTreeDwell(t);
        nearbyTimers[t.id]=now+60000; // prevent re-trigger for 60s
      }
    } else {
      // Left proximity
      delete nearbyTimers[t.id];
    }
  });
}

function onTreeDwell(t){
  // Always update verification date
  t.last_verified=today();
  
  // If watering session active, auto-water
  if(wateringSession){
    if(!sessionWatered.includes(t.id)&&canLogToday(t,'irrigazione')){
      t.interventions.push({id:'i'+Date.now(),type:'irrigazione',date:today(),
        details:{volume_litri:waterLiters},note:'(sessione auto)'});
      sessionWatered.push(t.id);
      document.getElementById('sessionCount').textContent=sessionWatered.length;
      renderMarkers();
      showToast('💧 #'+t.num+' '+t.common+' annaffiato automaticamente');
    }
  } else {
    showToast('✅ #'+t.num+' '+t.common+' verificato');
  }
  saveData();
  // Update sheet if this tree is open
  if(selectedId===t.id) renderSheet(t);
}

window.toggleSession=function(){
  if(wateringSession) endWateringSession();
  else startWateringSession();
};

function startWateringSession(){
  wateringSession=true;
  sessionWatered=[];
  document.getElementById('sessionBar').classList.add('active');
  document.getElementById('sessionCount').textContent='0';
  startGpsTracking();
  document.getElementById('btnSession').textContent='⏹';document.getElementById('btnSession').style.background='#c43030';showToast('💧 Sessione annaffiamento iniziata — cammina vicino agli alberi');
}

function endWateringSession(){
  const count=sessionWatered.length;
  wateringSession=false;
  sessionWatered=[];
  document.getElementById('sessionBar').classList.remove('active');
  stopGpsTracking();
  document.getElementById('btnSession').textContent='💧▶';document.getElementById('btnSession').style.background='#2b8adb';showToast('⏹ Sessione terminata — '+count+' alberi annaffiati');
}

// ═══ VOICE ═══
let recognition=null;
document.getElementById('btnMic').onclick=()=>{
  if(recognition){recognition.stop();return;}
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){showToast('⚠️ Riconoscimento vocale non supportato');return;}
  recognition=new SR();recognition.lang='it-IT';recognition.continuous=false;recognition.interimResults=true;
  recognition.onstart=()=>{document.getElementById('btnMic').classList.add('listening');document.getElementById('voiceBar').classList.add('show');document.getElementById('voiceText').textContent='...';};
  recognition.onresult=(e)=>{const r=e.results[e.results.length-1];document.getElementById('voiceText').textContent=r[0].transcript;if(r.isFinal) processVoice(r[0].transcript);};
  recognition.onend=()=>{document.getElementById('btnMic').classList.remove('listening');recognition=null;setTimeout(()=>document.getElementById('voiceBar').classList.remove('show'),2000);};
  recognition.onerror=(e)=>{document.getElementById('btnMic').classList.remove('listening');document.getElementById('voiceBar').classList.remove('show');recognition=null;if(e.error!=='aborted') showToast('⚠️ Errore: '+e.error);};
  recognition.start();
};

function processVoice(text){
  const lower=text.toLowerCase();
  let t=selectedId?trees.find(x=>x.id===selectedId):null;
  const numMatch=lower.match(/albero\s*(?:numero\s*)?(\d+)/);
  if(numMatch){const n=parseInt(numMatch[1]);const byNum=trees.find(x=>x.num===n);if(byNum){t=byNum;selectTree(byNum.id);}}
  const typeMap=[
    [/annaffi|irrig|innaffi|acqua/,'irrigazione'],
    [/potat|tagliato|potatura|secco/,'potatura'],
    [/compost|fertilizz|ammend|micorriz/,'compost'],
    [/irrorat|trattat|spruzz|rame|fungicid/,'irrorazione'],
    [/pacciam|cippat/,'pacciamatura'],
    [/tutor|palo|sostegno/,'tutoraggio'],
    [/erba|taglio\s*erba|falci/,'taglio_erba']
  ];
  for(const [rx,type] of typeMap){
    if(lower.match(rx)){
      if(!t){showToast('⚠️ Seleziona un albero o di\' "albero [numero]"');return;}
      if(!canLogToday(t,type)){showToast('⚠️ '+type+' già registrato oggi');return;}
      const details={};
      if(type==='irrigazione'){const m=lower.match(/(\d+)\s*lit/);details.volume_litri=m?parseInt(m[1]):DEFAULT_LITERS;}
      t.interventions.push({id:'i'+Date.now(),type,date:today(),details,note:'(voce) '+text});
      saveData();renderSheet(t);renderMarkers();
      showToast((INTERV_ICONS[type]||'📋')+' #'+t.num+' '+type+' registrato');
      return;
    }
  }
  // Session commands
  if(lower.match(/inizia.*annaffi|sessione.*annaffi|comincia.*annaffi|avvia.*annaffi/)){
    startWateringSession();
    return;
  }
  if(lower.match(/fine.*annaffi|stop.*annaffi|ferma.*annaffi|termina.*annaffi/)){
    endWateringSession();
    return;
  }
  showToast('🤔 Comando non riconosciuto');
}

// ═══ CAMERA ═══
const camInput=document.getElementById('camInput');
document.getElementById('btnCam').onclick=()=>{if(!selectedId){showToast('⚠️ Seleziona un albero');return;}
  const t=trees.find(x=>x.id===selectedId);

  camInput.click();};
camInput.onchange=(e)=>{const file=e.target.files[0];if(!file) return;const t=trees.find(x=>x.id===selectedId);if(!t) return;
  if(!t.photos) t.photos=[];
  if(t.photos.length>=5){showToast('⚠️ Massimo 5 foto');camInput.value='';return;}
  resizeImage(file,800,0.7,function(dataUrl){
    t.photos.push({id:'p'+Date.now(),data:dataUrl,timestamp:new Date().toISOString()});
    if(!t.profilePhoto&&t.photos.length===1) t.profilePhoto=t.photos[0].id;
    saveData();renderSheet(t);renderMarkers();
    showToast('📷 Foto salvata — #'+t.num+' ('+t.photos.length+'/5)');
  });
  camInput.value='';};

function resizeImage(file,maxSize,quality,cb){
  const reader=new FileReader();
  reader.onload=function(e){
    const img=new Image();
    img.onload=function(){
      const canvas=document.createElement('canvas');
      let w=img.width,h=img.height;
      if(w>h){if(w>maxSize){h=h*(maxSize/w);w=maxSize;}}
      else{if(h>maxSize){w=w*(maxSize/h);h=maxSize;}}
      canvas.width=w;canvas.height=h;
      canvas.getContext('2d').drawImage(img,0,0,w,h);
      cb(canvas.toDataURL('image/jpeg',quality));
    };
    img.src=e.target.result;
  };
  reader.readAsDataURL(file);
}

      r('Classe',qv.voc_classe)+

        '<div class="qv-co2-cell"><div class="v">'+(qv.co2_nuovo_assim||'?')+'</div><div class="u">CO\u2082 assim. nuovo</div></div>'+

    '<div class="viv-field"><label>Conservazione</label><select id="vivConservazione">'+
    VIV_CONSERVAZIONE.map(o=>'<option value="'+o+'"'+(viv.conservazione===o?' selected':'')+'>'+o.charAt(0).toUpperCase()+o.slice(1)+'</option>').join('')+'</select></div></div>'+
    '<div class="viv-field"><label>Ubicazione</label><select id="vivUbicazione"><option value="">-- seleziona --</option>'+

window.saveVivaio=function(){
  const t=trees.find(x=>x.id===selectedId);if(!t) return;
  t.vivaio={num_progressivo:parseInt(document.getElementById('vivNum').value)||t.num,
    data_semina:document.getElementById('vivData').value||null,num_semi:parseInt(document.getElementById('vivSemi').value)||null,
    num_piantine:parseInt(document.getElementById('vivPiantine').value)||null,num_travasi:parseInt(document.getElementById('vivTravasi').value)||0,
    provenienza_seme:document.getElementById('vivProvenienza').value||null,trattamento_seme:document.getElementById('vivTrattamento').value,
    conservazione:document.getElementById('vivConservazione').value,ubicazione:document.getElementById('vivUbicazione').value||null,
    note_semina:document.getElementById('vivNote').value||null};
  saveData();showToast('\uD83C\uDF31 Dati vivaio salvati — #'+t.num);
};



// ═══ IMAGES ═══
function renderImages(t){
  const grid=document.getElementById('imgGrid');
  const count=document.getElementById('imgCount');
  if(!t.photos||t.photos.length===0){
    grid.innerHTML='<div class="empty-msg">Nessuna foto · usa 📷 per scattare</div>';
    count.textContent='(0/5)';
    return;
  }
  count.textContent='('+t.photos.length+'/5)';
  grid.innerHTML=t.photos.map(p=>{
    const isProfile=t.profilePhoto===p.id;
    return '<div class="img-thumb-wrap">'+
      '<img class="img-thumb'+(isProfile?' profile':'')+'" src="'+p.data+'" onclick="viewFullImg(\''+p.id+'\')"/>'+
      '<span class="img-thumb-del" onclick="delPhoto(\''+p.id+'\')" title="Elimina">✕</span>'+
      '<span class="img-thumb-star" onclick="setProfilePhoto(\''+p.id+'\')" title="'+(isProfile?'Foto profilo':'Imposta come profilo')+'">'+(isProfile?'★':'☆')+'</span>'+
    '</div>';
  }).join('');
}

window.viewFullImg=function(photoId){
  const t=trees.find(x=>x.id===selectedId);if(!t) return;
  const p=(t.photos||[]).find(x=>x.id===photoId);if(!p) return;
  document.getElementById('imgFullSrc').src=p.data;
  document.getElementById('imgFullOverlay').classList.add('open');
};

window.delPhoto=function(photoId){
  const t=trees.find(x=>x.id===selectedId);if(!t) return;
  t.photos=t.photos.filter(p=>p.id!==photoId);
  if(t.profilePhoto===photoId) t.profilePhoto=t.photos.length>0?t.photos[0].id:null;
  saveData();renderSheet(t);renderMarkers();
  showToast('🗑️ Foto eliminata');
};

window.setProfilePhoto=function(photoId){
  const t=trees.find(x=>x.id===selectedId);if(!t) return;
  t.profilePhoto=photoId;
  saveData();renderSheet(t);renderMarkers();
  showToast('⭐ Foto profilo impostata');
};

window.confirmDeleteTree=function(){

  const existing=document.getElementById('deleteConfirm');
  if(existing){existing.remove();return;}
  const sheet=document.getElementById('sheet');
  const div=document.createElement('div');
  div.id='deleteConfirm';
  div.style.cssText='padding:16px 20px;background:#fff0f0;border-top:2px solid var(--accent);';
  div.innerHTML='<p style="font-size:14px;color:var(--accent);font-weight:600;margin-bottom:10px;">Eliminare #'+t.num+' '+t.common+'?</p>'+
    '<p style="font-size:12px;color:var(--muted);margin-bottom:12px;">Tutti i dati, interventi e foto verranno cancellati.</p>'+
    '<div style="display:flex;gap:10px;">'+
    '<button onclick="document.getElementById(\'deleteConfirm\').remove()" style="flex:1;padding:10px;border:1.5px solid var(--border);border-radius:10px;background:var(--bg);font-weight:600;cursor:pointer;font-family:var(--font);">Annulla</button>'+

window.doDeleteTree=function(){
  const t=trees.find(x=>x.id===selectedId);if(!t) return;
  const name='#'+t.num+' '+t.common;
  trees=trees.filter(x=>x.id!==selectedId);

// ═══ UTILS ═══
function showToast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');clearTimeout(el._t);el._t=setTimeout(()=>el.classList.remove('show'),2800);}
document.getElementById('sheetOverlay').onclick=closeSheet;


function logChange(t,campo,da,a){
  if(!t||!t.saved) return;
  da=String(da||'');a=String(a||'');
  if(da===a) return;
  t.interventions.push({id:'i'+Date.now()+Math.random(),type:'modifica',date:today(),details:{campo:campo,da:da,a:a},note:''});
}
window.saveTreeNote=function(){
  var t=trees.find(function(x){return x.id===selectedId;});if(!t) return;
  var el=document.getElementById('treeNote');if(!el) return;
  var nv=el.value;
  if(nv!==(t.note||'')){logChange(t,'Note',t.note,nv);t.note=nv;saveData();}
};
window.salvaAlbero=function(){
  var t=trees.find(function(x){return x.id===selectedId;});if(!t) return;
  t.saved=true;saveData();
  var s=document.getElementById('sectionSalvaAlbero');if(s)s.style.display='none';
  showToast('✅ Albero salvato');
};
window.exportData=function(){
  var blob=new Blob([JSON.stringify({trees:trees,zones:zones},null,2)],{type:'application/json'});
  var url=URL.createObjectURL(blob);var a=document.createElement('a');
  a.href=url;a.download='alberi_'+new Date().toISOString().split('T')[0]+'.json';
  a.click();URL.revokeObjectURL(url);showToast('✅ Backup esportato');
};
window.importData=function(input){
  var file=input.files[0];if(!file) return;
  var reader=new FileReader();
  reader.onload=function(e){
    try{var d=JSON.parse(e.target.result);
      if(!d.trees){showToast('⚠️ File non valido');return;}
      trees=d.trees;zones=d.zones||[];saveData();renderMarkers();renderZoneSelectors();
      showToast('✅ Importati '+trees.length+' alberi');
    }catch(err){showToast('⚠️ Errore: '+err.message);}
  };reader.readAsText(file);input.value='';
};

loadData();initMap();
